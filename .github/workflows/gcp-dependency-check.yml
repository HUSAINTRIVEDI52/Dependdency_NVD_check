name: GCP Dependency Check Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  # Connection details pulled securely from GitHub Secrets
  INSTANCE_NAME: ${{ secrets.GCP_USERNAME }}@${{ secrets.GCP_INSTANCE_NAME }}
  ZONE: ${{ secrets.GCP_ZONE }}
  SCAN_DIR: /home/${{ secrets.GCP_USERNAME }}/dependency-scan-dir

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ──────────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      # 2. GCP Authentication
      # ──────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # ──────────────────────────────────────────────
      # 3. Set up Cloud SDK
      # ──────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ──────────────────────────────────────────────
      # 4. Resolve VM username directly from the VM
      #    Asks the VM who it is — 100% accurate always
      # ──────────────────────────────────────────────
      - name: Resolve VM Username from GCP VM
        run: |
          GCP_VM_USER=$(gcloud compute ssh "$INSTANCE_NAME" \
            --zone="$ZONE" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="whoami" 2>/dev/null | tail -1 | tr -d '[:space:]')

          echo "GCP_VM_USER=$GCP_VM_USER" >> $GITHUB_ENV
          echo "✅ Resolved VM user: $GCP_VM_USER"

      # ──────────────────────────────────────────────
      # 5. Verify NVD DB exists on GCP Server
      # ──────────────────────────────────────────────
      - name: Verify NVD Database on GCP Server
        run: |
          DC_DATA_PATH="/home/$GCP_VM_USER/dc-data"

          gcloud compute ssh "$INSTANCE_NAME" \
            --zone="$ZONE" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              if [ ! -d '$DC_DATA_PATH' ]; then
                echo '❌ ERROR: NVD database directory not found at $DC_DATA_PATH'
                echo 'Please pre-download the NVD DB on the VM first using:'
                echo '  docker run --rm -v ~/dc-data:/usr/share/dependency-check/data owasp/dependency-check --updateonly --nvdApiKey <your-key>'
                exit 1
              fi
              echo '✅ NVD database found at $DC_DATA_PATH'
              ls -lh $DC_DATA_PATH
            "

      # ──────────────────────────────────────────────
      # 6. Create Working Directory on GCP Server
      # ──────────────────────────────────────────────
      - name: Create Working Directory on GCP Server
        run: |
          gcloud compute ssh "$INSTANCE_NAME" \
            --zone="$ZONE" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="mkdir -p $SCAN_DIR/odc-reports"

      # ──────────────────────────────────────────────
      # 7. Archive & Copy Code to GCP Server
      # ──────────────────────────────────────────────
      - name: Copy Repository to GCP Server
        run: |
          tar -czf /tmp/repo.tar.gz .

          gcloud compute scp /tmp/repo.tar.gz \
            "$INSTANCE_NAME:$SCAN_DIR/repo.tar.gz" \
            --zone="$ZONE" \
            --ssh-key-expire-after=1h

          gcloud compute ssh "$INSTANCE_NAME" \
            --zone="$ZONE" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="cd $SCAN_DIR && tar -xzf repo.tar.gz && rm repo.tar.gz"

      # ──────────────────────────────────────────────
      # 8. Run OWASP Dependency-Check via Docker
      #    --noupdate → uses pre-downloaded NVD DB only
      # ──────────────────────────────────────────────
      - name: Run OWASP Dependency-Check on GCP Server
        run: |
          DC_DATA_PATH="/home/$GCP_VM_USER/dc-data"

          gcloud compute ssh "$INSTANCE_NAME" \
            --zone="$ZONE" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              docker run --rm \
                -u \$(id -u):\$(id -g) \
                -v $SCAN_DIR:/src:z \
                -v $DC_DATA_PATH:/usr/share/dependency-check/data:z \
                -v $SCAN_DIR/odc-reports:/report:z \
                owasp/dependency-check \
                  --scan /src/backend \
                  --format HTML \
                  --format JSON \
                  --project 'github-scan' \
                  --out /report \
                  --nvdApiKey '${{ secrets.NVD_API_KEY }}' \
                  --noupdate \
                  --failOnCVSS 7 \
                  --enableRetired \
                  --enableExperimental
            "

      # ──────────────────────────────────────────────
      # 9. Copy Reports Back to Runner
      # ──────────────────────────────────────────────
      - name: Copy Dependency-Check Reports to Runner
        if: always()
        run: |
          gcloud compute scp \
            "$INSTANCE_NAME:$SCAN_DIR/odc-reports/dependency-check-report.html" \
            ./dependency-check-report.html \
            --zone="$ZONE"

          gcloud compute scp \
            "$INSTANCE_NAME:$SCAN_DIR/odc-reports/dependency-check-report.json" \
            ./dependency-check-report.json \
            --zone="$ZONE"

      # ──────────────────────────────────────────────
      # 10. Cleanup GCP Server
      # ──────────────────────────────────────────────
      - name: Clean Up GCP Server
        if: always()
        run: |
          gcloud compute ssh "$INSTANCE_NAME" \
            --zone="$ZONE" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="rm -rf $SCAN_DIR"

      # ──────────────────────────────────────────────
      # 11. Upload Reports as Artifacts
      # ──────────────────────────────────────────────
      - name: Upload Dependency-Check Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Dependency-Check-Report
          path: |
            ./dependency-check-report.html
            ./dependency-check-report.json
          retention-days: 30
